<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E2E — Monitoring Transakcji (AML)</title>
    <link rel="stylesheet" href="/styles/app.css">
    <style>
        body { max-width: 860px; margin: 0 auto; padding: 32px 20px 64px; }
        h1 { font-size: 1.4rem; margin-bottom: 4px; }
        .lead { color: var(--color-text-muted); margin-bottom: 20px; }
        .bar { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .summary { font-size: 1.05rem; font-weight: 700; padding: 10px 14px; border-radius: 6px; flex: 1; }
        .summary.running { background: var(--color-banner-info-bg); color: var(--color-banner-info-text); }
        .summary.ok { background: var(--color-approved-bg); color: var(--color-approved-text); }
        .summary.fail { background: var(--color-open-bg); color: var(--color-open-text); }
        button { font: inherit; font-weight: 600; border: 1px solid var(--color-primary); background: var(--color-primary); color: #fff; border-radius: 6px; padding: 9px 16px; cursor: pointer; }
        ol#steps { list-style: none; padding: 0; margin: 0; }
        ol#steps li { display: flex; align-items: baseline; gap: 8px; padding: 8px 10px; border-bottom: 1px solid var(--color-border); }
        ol#steps li .mark { width: 1.2em; font-weight: 700; }
        ol#steps li.running { color: var(--color-text-muted); }
        ol#steps li.ok { color: var(--color-text); }
        ol#steps li.ok .mark { color: var(--color-success); }
        ol#steps li.fail { color: var(--color-danger); }
        ol#steps li .title { font-weight: 600; }
        ol#steps li .detail { color: var(--color-text-muted); font-size: 0.9rem; }
        ol#steps li.fail .detail { color: var(--color-danger); }
    </style>
    <script type="module" src="./e2e.js"></script>
</head>
<body>
    <h1>Test E2E — pełny przepływ AML</h1>
    <p class="lead">Scenariusz uruchamia się automatycznie i przechodzi przez <strong>żywy backend</strong>
        (HTTP → reguły → asynchroniczna analiza → baza → API), pokazując każdy przypadek na żywo.
        To uzupełnienie testów jednostkowych komponentów (<a href="/test/">/test/</a>) i suite'u JUnit.</p>
    <div class="bar">
        <div id="summary" class="summary running">Inicjalizacja…</div>
        <button id="rerun">Uruchom ponownie</button>
    </div>
    <ol id="steps"></ol>
</body>
</html>
