spring.application.name=transaction-monitoring

# Virtual threads (Project Loom): HTTP request handling and @Async execution (ADR-0006)
spring.threads.virtual.enabled=true

# H2 in-memory database; schema is owned by Flyway, Hibernate only validates it (ADR-0002)
spring.datasource.url=jdbc:h2:mem:amldb;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# H2 web console for manual data inspection during review (recruitment scope only)
spring.h2.console.enabled=true

# Observability minimum (NFR-06)
management.endpoints.web.exposure.include=health,info,metrics

# AML rule parameters (REQ-09, REQ-10). The amount threshold compares the raw
# amount, currency-blind by documented simplification (ADR-0004); the frequency
# window is anchored to the transaction's business time (ADR-0005).
aml.rules.suspicious-amount.threshold=2000.00
aml.rules.high-frequency.max-transactions=5
aml.rules.high-frequency.window=PT1H
